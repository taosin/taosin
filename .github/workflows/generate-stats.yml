name: Generate GitHub Stats Images

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      username:
        description: 'GitHub username'
        required: true
        default: 'taosin'

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download stats images
        env:
          USERNAME: ${{ github.event.inputs.username || 'taosin' }}
        run: |
          mkdir -p assets

          echo "Downloading github-stats.svg..."
          curl -s -o assets/github-stats.svg "https://github-readme-stats.vercel.app/api?username=${USERNAME}&show_icons=true&theme=onedark&hide_border=true"

          echo "Downloading top-langs.svg..."
          curl -s -o assets/top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs?username=${USERNAME}&layout=donut&theme=onedark&hide_border=true"

          echo "Downloading streak-stats.svg..."
          curl -s -o assets/streak-stats.svg "https://streak-stats.demolab.com/?user=${USERNAME}&theme=dark&hide_border=true"

          echo "Done! Files in assets:"
          ls -la assets/

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/
          git diff --staged --quiet || git commit -m "chore: update github stats images [skip ci]"
          git push
